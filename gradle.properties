# Asigna más RAM al proceso de compilación (mínimo 4GB si tienes 16GB en total)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Habilita la ejecución en paralelo de módulos
org.gradle.parallel=true

# Activa el caché de compilación (RECOMENDADO)
org.gradle.caching=true

# Activa el Configuration Cache (Ahorra mucho tiempo en la fase inicial)
org.gradle.configuration-cache=true

# Optimización para proyectos Kotlin
kotlin.incremental=true
kotlin.code.style=official
org.gradle.workers.max=3